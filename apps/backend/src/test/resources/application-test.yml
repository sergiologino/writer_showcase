spring:
  task:
    scheduling:
      enabled: false
  datasource:
    url: jdbc:h2:mem:pub_${random.uuid};MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

publisher:
  jwt:
    secret: test-secret-key-that-is-long-enough-for-hs256-bits-alignment!!
    access-ttl-minutes: 60
    refresh-ttl-days: 7
  rate-limit:
    enabled: false
  cors:
    allowed-origins: http://localhost:5173
  storage:
    local-root: ${STORAGE_LOCAL_ROOT:target/test-storage}
    max-upload-bytes: 1048576
  redis:
    enabled: false
  public-site:
    base-url: ""
  channels:
    poll-delay-ms: 60000
