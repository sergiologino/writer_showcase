# Локальная инфраструктура для разработки.
# Только PostgreSQL: docker compose up -d
# Postgres + Redis + API (образ из apps/backend/Dockerfile): docker compose --profile backend up -d
# JDBC с хоста: localhost:5432. Redis: localhost:6379. Из контейнера api: postgres:5432, redis:6379.

services:
  redis:
    image: redis:7-alpine
    container_name: writer-showcase-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    container_name: writer-showcase-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: publisher
      POSTGRES_PASSWORD: publisher
      POSTGRES_DB: publisher
    ports:
      - "5432:5432"
    volumes:
      - publisher_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U publisher -d publisher"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    profiles: ["backend"]
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: writer-showcase-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATASOURCE_URL: jdbc:postgresql://postgres:5432/publisher
      DATASOURCE_USERNAME: publisher
      DATASOURCE_PASSWORD: publisher
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-min-256-bits-for-production-use-256bits!}
      STORAGE_LOCAL_ROOT: /data/storage
      JWT_REFRESH_TTL_DAYS: ${JWT_REFRESH_TTL_DAYS:-30}
      AI_INTEGRATION_BASE_URL: ${AI_INTEGRATION_BASE_URL:-}
      AI_INTEGRATION_API_KEY: ${AI_INTEGRATION_API_KEY:-}
      PUBLISHER_REDIS_ENABLED: ${PUBLISHER_REDIS_ENABLED:-true}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      PUBLIC_SITE_BASE_URL: ${PUBLIC_SITE_BASE_URL:-http://localhost:5173}
    volumes:
      - publisher_media:/data/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  publisher_data:
  publisher_media:
